spring.application.name=demo
# Database URL - Replace 'your_db_name' with your actual schema name
spring.datasource.url=jdbc:mysql://localhost:3306/system-health-AI?createDatabaseIfNotExist=true

# Database Credentials
spring.datasource.username=root
spring.datasource.password=YOUR_PASSWORD

# Driver Class Name (Optional for modern Spring Boot versions)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Properties
# 'update' updates schema, 'none' is recommended for production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Details
SECRET_KEY=YOUR_SECRET_KEY
EXPIRATION=86400000

# Logging Properties
logging.level.root=INFO
logging.level.com.systemhealth=DEBUG
logging.file.name=logs/app.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger - %msg%n

# Favicon Disable
logging.level.org.springframework.web.servlet.resource=ERROR
