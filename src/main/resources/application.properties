spring.application.name=demo
# Database URL - Replace 'your_db_name' with your actual schema name
spring.datasource.url=jdbc:mysql://localhost:3306/system-health-AI?useSSL=false&serverTimezone=UTC

# Database Credentials
spring.datasource.username=root
spring.datasource.password=Sanket@1234

# Driver Class Name (Optional for modern Spring Boot versions)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Properties
# 'update' updates schema, 'none' is recommended for production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
